<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="一服">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0e18">
<title>一服 — 姫路グルメ 喫煙席検索</title>
<!-- ホーム画面アイコン (PWA) -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<!-- Leaflet (地図) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
:root{
  /* 背景 */
  --bg:#0d0e18;            /* 深い藍墨色 */
  --bg2:#14151f;            /* セクション背景 */
  --bg3:#1a1c28;            /* 入力欄背景 */
  --bg-primary:#0d0e18;
  --bg-secondary:#14151f;

  /* 障子（半透明サーフェス） */
  --surface-shoji:rgba(245,240,230,0.06);
  --surface-shoji-hover:rgba(245,240,230,0.10);
  --surface-shoji-active:rgba(212,165,116,0.12);

  /* 罫線 */
  --border-faint:rgba(212,165,116,0.15);
  --border-soft:rgba(245,240,230,0.10);

  /* 行灯（琥珀色アクセント） */
  --accent-andon:#d4a574;
  --accent-andon-soft:#e8c89a;
  --accent-andon-glow:rgba(212,165,116,0.30);

  /* テキスト（和紙色） */
  --text:#ece4d3;
  --text-primary:#ece4d3;
  --text2:#a89e8c;
  --text-secondary:#a89e8c;
  --text3:#6b6557;
  --text-muted:#6b6557;

  /* 互換用の旧変数（既存スタイル維持のため一律 accent に向ける） */
  --neon:#d4a574;
  --neon2:#e8c89a;
  --cyan:#a89e8c;
  --purple:#d4a574;
  --green:#d4a574;
  --yellow:#d4a574;
  --orange:#d4a574;

  --r:6px;--rs:4px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:0;height:0;}
body{font-family:"Yu Mincho","游明朝","Noto Serif JP","Hiragino Mincho ProN","Cormorant Garamond",serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;font-weight:400;letter-spacing:0.05em;line-height:1.8;}
/* 和紙テクスチャ（背景ノイズ） */
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:0.04;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");}
/* 行灯のラジアルグラデ（柔らかい中央光） */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px);opacity:0.10;}
.orb1{width:500px;height:500px;background:var(--accent-andon);top:-200px;right:-120px;}
.orb2{width:380px;height:380px;background:var(--accent-andon-soft);bottom:-120px;left:-80px;opacity:0.06;}
.orb3{width:260px;height:260px;background:var(--accent-andon);top:45%;left:55%;opacity:0.05;}

/* ══ Neon を無効化（互換のため空クラス保持） ══ */
@keyframes neon-flicker{0%,100%{opacity:1;}}
@keyframes neon-pulse{0%,100%{opacity:1;}}
@keyframes neon-pulse-y{0%,100%{opacity:1;}}
.nn,.np-r,.np-y{color:var(--accent-andon);text-shadow:0 0 12px var(--accent-andon-glow);animation:none;}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:300;background:#0d0e18;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity .7s ease;}
#splash.fade-out{opacity:0;pointer-events:none;}
.splash-logo{font-family:"Yu Mincho","游明朝","Noto Serif JP","Hiragino Mincho ProN",serif;font-size:min(28vw,128px);letter-spacing:0.25em;color:var(--accent-andon);font-weight:500;line-height:1;text-shadow:0 0 32px var(--accent-andon-glow);animation:splash-glow 1.8s ease-out both;}
.splash-logo-img{display:block;width:min(70vw,360px);height:auto;margin:0 auto;filter:drop-shadow(0 0 32px var(--accent-andon-glow));animation:splash-glow 1.8s ease-out both;}
.splash-sub{font-size:11px;letter-spacing:0.4em;color:var(--text-secondary);margin-top:18px;animation:splash-sub-in 1.8s .3s ease both;opacity:0;font-family:"Noto Serif JP",serif;text-align:center;}
@keyframes splash-glow{0%{opacity:0;transform:scale(.94);}50%{opacity:1;transform:scale(1.02);}100%{opacity:1;transform:scale(1);}}
@keyframes splash-sub-in{0%{opacity:0;transform:translateY(8px);}100%{opacity:1;transform:translateY(0);}}

/* ══ PASSWORD ══ */
#pw-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:32px 20px;text-align:center;}
#pw-screen::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 38%,var(--accent-andon-glow) 0%,transparent 65%);opacity:.5;}
.pw-tube{font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;font-size:72px;letter-spacing:0.25em;line-height:1;display:block;margin-bottom:6px;color:var(--accent-andon);text-shadow:0 0 32px var(--accent-andon-glow);font-weight:500;position:relative;z-index:1;}
.pw-logo-img{display:block;width:min(60vw,260px);height:auto;margin:0 auto 6px;position:relative;z-index:1;filter:drop-shadow(0 0 24px var(--accent-andon-glow));}
.pw-sub{font-size:11px;color:var(--text-secondary);letter-spacing:0.4em;margin-bottom:48px;font-family:"Noto Serif JP",serif;opacity:0.9;position:relative;z-index:1;}
.pw-card{width:100%;max-width:380px;background:var(--surface-shoji);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);border:1px solid var(--border-faint);border-radius:4px;padding:32px 26px;box-shadow:none;position:relative;z-index:1;}
.pw-label{font-size:12px;color:var(--text-secondary);margin-bottom:18px;letter-spacing:0.15em;}
.pw-input{width:100%;padding:14px 0;letter-spacing:0.5em;font-size:24px;background:transparent;border:none;border-bottom:1px solid var(--border-faint);border-radius:0;color:var(--text-primary);text-align:center;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;outline:none;transition:border-color 400ms cubic-bezier(0.4,0,0.2,1);margin-bottom:20px;}
.pw-input:focus{border-bottom-color:var(--accent-andon);}
.pw-input::placeholder{color:var(--text-muted);}
.pw-btn{width:100%;padding:13px 32px;background:transparent;border:1px solid var(--accent-andon);border-radius:2px;color:var(--accent-andon);font-size:13px;font-weight:500;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;cursor:pointer;letter-spacing:0.3em;box-shadow:none;transition:all 400ms cubic-bezier(0.4,0,0.2,1);}
.pw-btn:hover{background:rgba(212,165,116,0.1);box-shadow:0 0 20px var(--accent-andon-glow);}
.pw-btn:active{opacity:.85;transform:scale(.98);}
.pw-err{font-size:12px;color:var(--accent-andon-soft);margin-top:14px;min-height:20px;text-shadow:none;letter-spacing:0.1em;}
.pw-hint{font-size:11px;color:var(--text-muted);margin-top:18px;line-height:1.9;letter-spacing:0.1em;}
/* パスワード表示ボタン */


/* ══ APP ══ */
#app{display:none;position:relative;z-index:1;}

.hdr{position:sticky;top:0;z-index:20;background:rgba(13,14,24,.85);backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);border-bottom:1px solid var(--border-faint);padding:18px 18px 14px;padding-top:max(18px,env(safe-area-inset-top,0px));}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.hdr-logo-wrap{position:relative;display:flex;flex-direction:column;gap:0;}
.hdr-logo{font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;font-size:34px;letter-spacing:0.25em;line-height:1;background:none;color:var(--accent-andon);font-weight:500;}
.hdr-logo-text{font-family:"Yu Mincho","游明朝","Noto Serif JP","Hiragino Mincho ProN",serif;font-size:30px;line-height:1;letter-spacing:0.3em;color:var(--accent-andon);font-weight:500;text-shadow:0 0 16px var(--accent-andon-glow);display:inline-block;padding:2px 4px 2px 0;}
.hdr-logo-img{display:block;height:42px;width:auto;flex-shrink:0;filter:drop-shadow(0 0 12px var(--accent-andon-glow));}
/* ネオン管チラつきアニメ */
@keyframes tube-flicker{
  0%,17%,19%,22%,55%,58%,100%{stroke:var(--accent-andon);opacity:1;}
  18%,56%{stroke:var(--text-muted);opacity:0.5;}
  20%{stroke:var(--accent-andon);opacity:0.9;}
  57%{stroke:var(--accent-andon);opacity:0.7;}
}
@keyframes core-flicker{
  0%,17%,19%,22%,55%,58%,100%{fill:#fff;opacity:0.92;}
  18%,56%{fill:var(--accent-andon-soft);opacity:0.4;}
  20%{fill:#fff;opacity:0.88;}
}
/* けむりちゃんのふわふわアニメ */
#ippuku-chan{animation:chan-float 3.5s ease-in-out infinite;}
@keyframes chan-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}

/* ══ 店舗詳細ポップアップ（自前モーダル） ══ */
#shop-modal{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;}
#shop-modal.hidden{display:none;}
.shop-modal-card{background:#14151f;border:1px solid rgba(212,165,116,.25);border-radius:16px;width:100%;max-width:520px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(212,165,116,.2);}
.shop-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(212,165,116,.08);border-bottom:1px solid rgba(212,165,116,.2);flex-shrink:0;}
.shop-modal-title{color:#fff;font-weight:900;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:10px;text-shadow:0 0 8px var(--accent-andon-glow);}
.shop-modal-close{background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0 6px;}
.shop-modal-body{flex:1;overflow-y:auto;color:var(--text);}
.sm-photo{width:100%;aspect-ratio:16/9;background:#1a1c28;object-fit:cover;display:block;}
.sm-photo-ph{width:100%;aspect-ratio:16/9;background:#1a1c28;display:flex;align-items:center;justify-content:center;font-size:60px;color:var(--text-muted);}
.sm-content{padding:16px;}
.sm-genre{display:inline-block;background:rgba(212,165,116,.08);color:var(--cyan);padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;border:1px solid rgba(212,165,116,.25);margin-bottom:10px;}
.sm-catch{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6;}
.sm-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;}
.sm-row:last-of-type{border-bottom:none;}
.sm-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.sm-label{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:2px;}
.sm-value{color:var(--text);line-height:1.5;word-break:break-word;}
.sm-actions{display:flex;gap:8px;padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);flex-shrink:0;}
.sm-btn{flex:1;padding:13px;border-radius:10px;border:none;font-size:13px;font-weight:900;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:1px;}
.sm-btn-primary{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#fff;box-shadow:0 4px 16px rgba(212,165,116,.25);}
.sm-btn-secondary{background:rgba(212,165,116,.08);color:var(--cyan);border:1px solid rgba(212,165,116,.25);}
.sm-btn:active{opacity:.85;transform:scale(.98);}

/* ══ もっと見るボタン ══ */
.load-more-wrap{display:flex;justify-content:center;padding:24px 16px 40px;}
.load-more-btn{padding:14px 28px;background:linear-gradient(135deg,var(--neon),var(--neon2));border:none;border-radius:var(--rs);color:#fff;font-weight:900;font-size:14px;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 24px var(--accent-andon-glow);transition:opacity .2s,transform .1s;}
.load-more-btn:active{opacity:.85;transform:scale(.97);}
.load-more-btn:disabled{opacity:.55;cursor:not-allowed;}

/* ══ 地図 ══ */
#map{width:100%;height:calc(100dvh - 220px);min-height:400px;border-radius:12px;overflow:hidden;background:#0a0a14;}
.leaflet-container{background:#0a0a14;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;}
.leaflet-popup-content-wrapper{background:rgba(20,21,31,.95);color:#fff;border:1px solid rgba(212,165,116,.25);border-radius:10px;box-shadow:0 0 24px rgba(212,165,116,.25);}
.leaflet-popup-content{margin:10px 14px;font-size:13px;font-weight:700;}
.leaflet-popup-tip{background:rgba(20,21,31,.95);border:1px solid rgba(212,165,116,.25);}
.kemuri-pin{display:block;width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 12px currentColor,0 2px 6px rgba(0,0,0,.6);transition:transform .15s;}
.kemuri-pin:hover{transform:scale(1.15);}
.kemuri-pin.pin-heat{background:var(--accent-andon);color:var(--accent-andon);}
.kemuri-pin.pin-paper{background:var(--accent-andon);color:var(--accent-andon);}
.kemuri-pin.pin-room{background:var(--accent-andon);color:var(--accent-andon);}
.kemuri-pin.pin-none{background:var(--text-secondary);color:var(--text-secondary);}
.map-legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:10px 0;font-size:11px;color:var(--text2);}
.map-legend-item{display:flex;align-items:center;gap:5px;}
.map-legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;}

/* ══ 一服 マーク（静止） ══ */
.ippuku-mark{display:block;filter:drop-shadow(0 6px 20px var(--accent-andon-glow));}
.cat-splash{width:140px;height:auto;margin:24px auto 0;opacity:0;animation:cat-fade-in 1.2s .8s ease both;}
@keyframes cat-fade-in{0%{opacity:0;transform:translateY(20px) scale(.85);}100%{opacity:1;transform:translateY(0) scale(1);}}
.cat-pw{width:110px;height:auto;margin:14px auto 18px;}
.cat-empty{width:120px;height:auto;margin:0 auto 8px;opacity:.9;}
.cat-hdr{width:36px;height:36px;flex-shrink:0;}


  18%{color:var(--text-secondary);text-shadow:0 0 2px var(--text-secondary),0 0 4px var(--neon);}
  20%,21%{color:var(--accent-andon-soft);text-shadow:0 0 2px #fff,0 0 8px #fff,0 0 20px var(--neon),0 0 50px var(--neon);}
  55%,56%{color:var(--text-secondary);text-shadow:none;}
}
.logo-sub{font-size:8px!important;color:var(--text3)!important;letter-spacing:2px!important;margin-top:3px!important;font-family:"Noto Serif JP",serif!important;font-weight:400!important;opacity:0.9!important;text-transform:none!important;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-badge{border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;background:rgba(212,165,116,.08);border:1px solid rgba(212,165,116,.25);white-space:nowrap;}
/* 店舗追加ボタン */
.add-btn{width:36px;height:36px;border-radius:50%;background:rgba(212,165,116,.08);border:1px solid rgba(212,165,116,.25);color:var(--cyan);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.add-btn:active{transform:scale(.9);}

.search-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--rs);padding:10px 14px;gap:8px;transition:border-color .2s;}
.search-wrap:focus-within{border-color:var(--accent-andon-glow);box-shadow:0 0 12px rgba(212,165,116,.10);}
.search-wrap input{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;outline:none;}
.search-wrap input::placeholder{color:var(--text3);}

.genre-row{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);}
.gbtn{white-space:nowrap;padding:9px 18px;border-radius:2px;font-size:13px;font-weight:400;font-family:"Yu Mincho","游明朝","Noto Serif JP","Hiragino Mincho ProN",serif;letter-spacing:0.15em;border:1px solid var(--border-soft);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all 400ms cubic-bezier(0.4,0,0.2,1);flex-shrink:0;line-height:1;}
.gbtn.on{border-color:var(--accent-andon);color:var(--accent-andon);background:var(--surface-shoji-active);box-shadow:0 0 14px var(--accent-andon-glow);text-shadow:none;}
.gbtn:hover{border-color:var(--border-faint);color:var(--text-primary);}
.gbtn:active{transform:scale(.97);}

.chip-row{display:flex;gap:7px;padding:0 16px 8px;overflow-x:auto;scrollbar-width:none;}
.chip{white-space:nowrap;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,.08);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0;}
.chip.on{background:rgba(0,229,255,.08);border-color:var(--cyan);color:#fff;text-shadow:0 0 8px var(--cyan);}
.chip:active{transform:scale(.95);}

.vf-row{display:flex;gap:7px;padding:4px 16px 12px;overflow-x:auto;scrollbar-width:none;align-items:center;}
.vf-lbl{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.vfchip{white-space:nowrap;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.08);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0;}
.vfchip:active{transform:scale(.95);}
.vf-all-on{border-color:var(--green)!important;color:#fff!important;background:rgba(0,255,136,.08)!important;text-shadow:0 0 8px var(--green);}
.vf-heat-on{border-color:var(--orange)!important;color:#fff!important;background:rgba(255,107,53,.08)!important;text-shadow:0 0 8px var(--orange);}
.vf-paper-on{border-color:var(--neon)!important;color:#fff!important;background:rgba(212,165,116,.06)!important;text-shadow:0 0 8px var(--neon);}
.vf-room-on{border-color:var(--cyan)!important;color:#fff!important;background:rgba(0,229,255,.08)!important;text-shadow:0 0 8px var(--cyan);}

.divider{height:1px;background:linear-gradient(to right,transparent,rgba(255,26,107,.18),transparent);margin:0 16px 6px;}
.rmeta{padding:6px 16px 2px;font-size:12px;color:var(--text3);}
.rmeta b{color:var(--neon);}

/* ══ CARDS ══ */
.cards{padding:8px 16px 100px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(255,255,255,.06);overflow:hidden;animation:fadeUp .32s ease both;}
.card:hover{border-color:rgba(255,26,107,.22);box-shadow:0 8px 32px rgba(255,26,107,.09);}
/* 手動追加カードは枠をシアンに */
.card.custom{border-color:rgba(0,229,255,.2);}
.card.custom:hover{border-color:rgba(0,229,255,.45);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.card:nth-child(1){animation-delay:.03s;}.card:nth-child(2){animation-delay:.07s;}
.card:nth-child(3){animation-delay:.11s;}.card:nth-child(4){animation-delay:.15s;}
.card:nth-child(5){animation-delay:.19s;}.card:nth-child(6){animation-delay:.23s;}
.card:nth-child(7){animation-delay:.27s;}.card:nth-child(8){animation-delay:.31s;}

.cimg{width:100%;height:150px;position:relative;overflow:hidden;background:var(--bg3);cursor:pointer;}
.cimg img{width:100%;height:100%;object-fit:cover;display:block;}
.cimg-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;color:var(--text3);background:linear-gradient(135deg,var(--bg3),var(--bg2));}
.cimg-ov{position:absolute;bottom:0;left:0;right:0;height:70px;background:linear-gradient(to top,rgba(5,5,13,.95),transparent);}
.spill{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;backdrop-filter:blur(10px);}
.sp-open{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3);text-shadow:0 0 8px var(--green);}
.sp-closed{background:var(--border-faint);color:#ff8080;border:1px solid rgba(212,165,116,.25);}
.sp-unk{background:rgba(255,255,255,.08);color:var(--text2);border:1px solid rgba(255,255,255,.12);}
/* 手動追加バッジ */
.spill-custom{position:absolute;top:10px;left:10px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(212,165,116,.10);color:var(--cyan);border:1px solid rgba(212,165,116,.25);backdrop-filter:blur(8px);}

.cbody{padding:14px 15px 16px;}
.cname-wrap{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;cursor:pointer;margin-bottom:3px;}
.cname{font-size:17px;font-weight:700;line-height:1.3;color:#fff;text-shadow:0 0 8px var(--accent-andon-glow);}
.crating{font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.caddr{font-size:11px;color:var(--text3);margin-bottom:9px;}
.ctags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:14px;font-size:11px;font-weight:700;}
.bg-genre{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid rgba(255,255,255,.08);}
.bg-priv{background:rgba(255,124,30,.1);color:var(--neon2);border:1px solid rgba(255,124,30,.22);}

.cstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;}
.sbox{background:var(--bg3);border-radius:10px;padding:8px;text-align:center;}
.slbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.sval{font-size:11px;font-weight:700;color:var(--text);line-height:1.2;}
.s-open{color:var(--green);text-shadow:0 0 8px var(--green);}
.s-low{color:var(--cyan);}.s-mid{color:var(--yellow);}.s-hi{color:var(--neon);}

.vsec{background:var(--bg3);border-radius:var(--rs);padding:12px 13px;border:1px solid rgba(255,255,255,.06);}
.vtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.vtop-lbl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.vtot{font-size:11px;color:var(--text3);}
.vbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.vbtn{padding:9px 4px;border-radius:10px;font-size:12px;font-weight:700;border:1px solid;background:transparent;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;position:relative;overflow:hidden;}
.vbtn:active{transform:scale(.93);}
.vbtn.selected::after{content:'✓';position:absolute;top:3px;right:7px;font-size:10px;}
.vb-heat{color:var(--orange);border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.08);}
.vb-heat.selected{background:rgba(255,107,53,.2);box-shadow:0 0 12px rgba(255,107,53,.4);text-shadow:0 0 8px var(--orange);}
.vb-paper{color:var(--neon);border-color:var(--accent-andon-glow);background:rgba(212,165,116,.06);}
.vb-paper.selected{background:var(--border-faint);box-shadow:0 0 12px var(--accent-andon-glow);text-shadow:0 0 8px var(--neon);}
.vb-room{color:var(--cyan);border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.08);}
.vb-room.selected{background:rgba(0,229,255,.2);box-shadow:0 0 12px rgba(212,165,116,.25);text-shadow:0 0 8px var(--cyan);}
.vb-nope{color:var(--text3);border-color:rgba(255,255,255,.1);background:rgba(0,0,0,.2);}
.vb-nope.selected{background:rgba(255,255,255,.08);color:var(--text2);}

.vbars{display:flex;flex-direction:column;gap:6px;}
.vbar-row{display:flex;align-items:center;gap:7px;}
.vblbl{font-size:10px;color:var(--text2);width:66px;flex-shrink:0;}
.vbtrack{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.vbfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.25,.46,.45,.94);}
.fill-heat{background:var(--orange);box-shadow:0 0 6px var(--orange);}
.fill-paper{background:var(--neon);box-shadow:0 0 6px var(--neon);}
.fill-room{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}
.vbcnt{font-size:10px;color:var(--text3);width:20px;text-align:right;flex-shrink:0;}
.maj-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-top:8px;}
.maj-heat{background:rgba(255,107,53,.14);color:var(--orange);border:1px solid rgba(255,107,53,.3);}
.maj-paper{background:rgba(255,26,107,.14);color:var(--neon);border:1px solid rgba(212,165,116,.25);}
.maj-room{background:rgba(0,229,255,.14);color:var(--cyan);border:1px solid rgba(212,165,116,.25);}

.olink{display:block;width:100%;margin-top:12px;padding:11px;background:transparent;border:1px solid rgba(212,165,116,.25);border-radius:var(--rs);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;transition:all .15s;letter-spacing:0.5px;text-shadow:0 0 8px var(--accent-andon-glow);}
.olink:hover{background:rgba(212,165,116,.06);border-color:var(--neon);}

.loading-wrap{display:flex;flex-direction:column;align-items:center;padding:64px 20px;gap:14px;}
.spinner{width:36px;height:36px;border:2px solid var(--border-faint);border-top-color:var(--neon);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-size:13px;color:var(--text2);letter-spacing:1px;}
.empty-w{display:flex;flex-direction:column;align-items:center;padding:64px 20px;gap:12px;color:var(--text3);text-align:center;line-height:1.7;}
.err-w{margin:16px;padding:16px;background:rgba(255,26,107,.07);border:1px solid var(--border-faint);border-radius:var(--rs);font-size:13px;color:#ff8080;line-height:1.8;}

/* ── 右下固定ボタン群 ── */
.fab-group{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));right:16px;z-index:50;display:flex;flex-direction:column;gap:10px;align-items:center;}
.fab{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s;border:none;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;}
.fab:active{transform:scale(.9);}
.fab-top{background:var(--border-faint);border:1px solid var(--accent-andon-glow);color:var(--neon);box-shadow:0 0 12px rgba(212,165,116,.2);}
.fab-top:hover{background:rgba(212,165,116,.2);}

/* ── タブ（すべて / お気に入り）── */
.tab-row{display:flex;gap:0;padding:0 16px 0;margin-bottom:0;}
.tab-btn{flex:1;padding:10px 0;font-size:13px;font-weight:700;background:transparent;border:none;border-bottom:2px solid rgba(255,255,255,.08);color:var(--text3);cursor:pointer;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;transition:all .18s;letter-spacing:0.5px;}
.tab-btn.active{color:var(--neon);border-bottom-color:var(--neon);text-shadow:0 0 8px var(--accent-andon-glow);}

/* ── ☆ お気に入りボタン ── */
.fav-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;line-height:1;transition:transform .15s;flex-shrink:0;}
.fav-btn:active{transform:scale(.85);}
.fav-btn.active{filter:drop-shadow(0 0 6px #ffcc00);}

/* ── お気に入り空欄 ── */
.fav-empty{display:flex;flex-direction:column;align-items:center;padding:64px 20px;gap:12px;color:var(--text3);text-align:center;line-height:1.7;}

/* ══ MODAL (手動追加) ══ */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;}
.modal-bg.hidden{display:none;}
.modal{width:100%;max-width:480px;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid rgba(0,229,255,.2);padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));max-height:90dvh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:900;color:#fff;text-align:center;margin-bottom:20px;letter-spacing:1px;}
.modal-title span{color:var(--cyan);text-shadow:0 0 10px var(--cyan);}
.mrow{margin-bottom:14px;}
.mlbl{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.minput{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:var(--text);font-size:14px;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;outline:none;transition:border-color .2s;}
.minput:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(212,165,116,.10);}
.mselect{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:var(--text);font-size:14px;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;outline:none;appearance:none;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
.m-cancel{padding:13px;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:var(--text2);font-size:14px;font-weight:700;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;cursor:pointer;}
.m-submit{padding:13px;background:linear-gradient(135deg,var(--cyan),var(--accent-andon-soft));border:none;border-radius:var(--rs);color:#000;font-size:14px;font-weight:900;font-family:"Yu Mincho","游明朝","Noto Serif JP",serif;cursor:pointer;letter-spacing:1px;}
.m-submit:active{opacity:.85;transform:scale(.98);}
.m-err{font-size:12px;color:var(--neon);margin-top:8px;text-align:center;min-height:18px;}
</style>
</head>

<script>
// ══ CAPACITOR API BASE ══
// ネイティブアプリ実行時は Cloudflare Pages の絶対 URL を使用する。
// ★ デプロイ後、下記を実際の Cloudflare Pages URL に書き換えてください ★
const IPPUKU_API_BASE = (function(){
  try {
    if (window.Capacitor && Capacitor.isNativePlatform && Capacitor.isNativePlatform()) {
      return 'https://kemuri-himeji.pages.dev';
    }
  } catch(_){}
  return '';
})();

// ══ SPLASH ══
(function(){
  const s = document.getElementById('splash');
  setTimeout(()=>{
    s.classList.add('fade-out');
    setTimeout(()=>s.style.display='none',700);
  },2000);
})();

// ══ PASSWORD ══
function todayPw(){
  const d=new Date(), y=d.getFullYear()%100, m=d.getMonth()+1, dd=d.getDate();
  return String(((y+m+dd)*47+m*dd)%9000+1000);
}
console.log('%c今日のPW: '+todayPw(),'color:var(--accent-andon);font-size:18px;font-weight:bold;');

// 一服ロゴを3回タップ → パスワードを一瞬光らせて表示
(function(){
  let taps=0, timer;
  const logo = document.getElementById('pw-logo');
  if(!logo) return;
  logo.style.cursor='pointer';
  logo.addEventListener('click', function(){
    taps++;
    // 1回ごとに明滅エフェクト
    this.style.opacity='0.6';
    setTimeout(()=>this.style.opacity='1', 100);
    clearTimeout(timer);
    if(taps>=3){

// ══ VOTES API ══
// Cloudflare KV は結果整合性（書き込み伝播に最大60秒）のため、
// 自分が投票した直後はサーバー値で上書きせず、ローカル状態を優先する。
let lastVoteAt=0;
const VOTE_PROPAGATION_MS=60000; // KV 伝播待ち時間

async function loadVotes(){
  try{
    // cache:'no-store' でブラウザキャッシュを回避し、必ず最新を取りに行く
    const r=await fetch(IPPUKU_API_BASE+'/api/votes?userId='+encodeURIComponent(userId)+'&t='+Date.now(),{cache:'no-store'});
    if(r.ok){
      const fresh=await r.json();
      // サーバーから「自分の投票」を取り出して myVotes を復元（キャッシュ消去後の復活用）
      const recovered={};
      for(const id in fresh){
        if(fresh[id].myVote){
          recovered[id]=fresh[id].myVote;
          delete fresh[id].myVote; // 集計データには含めない
        }
      }
      if(Object.keys(recovered).length){
        myVotes={...recovered,...myVotes}; // ローカルが優先（最新の投票を上書きしないため）
        localStorage.setItem('kemuri_mv',JSON.stringify(myVotes));
      }
      // 直近60秒以内に投票した店舗は、ローカルの新しい状態を保持してマージ
      if(Date.now()-lastVoteAt<VOTE_PROPAGATION_MS){
        for(const id in votes){
          if(myVotes[id]){ // 自分が投票した店舗だけローカル優先
            fresh[id]=votes[id];
          }
        }
      }
      // KV 結果整合性対策: サーバーが完全に空 {} を返した時だけキャッシュを使う
      // それ以外は常にサーバーを信頼する（端末間の同期を優先）
      const freshIsEmpty=Object.keys(fresh).length===0;
      const cacheHasData=Object.keys(votes).length>0;
      if(!freshIsEmpty||!cacheHasData){
        votes=fresh;
        _saveVotesCache();
      }
      // else: サーバーが空でキャッシュにデータがある → 起動直後の KV stale 対策でキャッシュ保持
    }
  }catch(_){ /* ネットワークエラー時は既存の votes を保持 */ }
}
async function castVote(shopId,shopName,type){
  if(!votes[shopId])votes[shopId]={heat:0,paper:0,room:0,nope:0};
  const prev=myVotes[shopId];
  if(prev&&votes[shopId][prev]>0)votes[shopId][prev]--;
  myVotes[shopId]=type;votes[shopId][type]++;
  localStorage.setItem('kemuri_mv',JSON.stringify(myVotes));
  lastVoteAt=Date.now();
  _saveVotesCache(); // 楽観的更新をキャッシュにも保存
  rerenderCurrentTab();
  voteInFlight++;
  try{
    const r=await fetch(IPPUKU_API_BASE+'/api/votes',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({shopId,shopName,type,userId}),
      cache:'no-store'
    });
    if(r.ok){
      const updated=await r.json();
      // サーバー側で userId ごとの再投票処理を済ませた正値で上書き
      votes[shopId]={
        heat:updated.heat||0,
        paper:updated.paper||0,
        room:updated.room||0,
        nope:updated.nope||0,
        name:updated.name||''
      };
      lastVoteAt=Date.now(); // 再度更新時刻を記録
      _saveVotesCache(); // 投票結果をブラウザに保存
      rerenderCurrentTab();
    }
  }catch(_){}
  finally{voteInFlight=Math.max(0,voteInFlight-1);}
}

  if(curTab==='fav')return renderFavTab();

function startVotePolling(){
  if(votePollTimer)return;

    if(voteInFlight>0||document.hidden)return;
    await Promise.all([loadVotes(),loadCustomShops()]);

  // タブが復帰した時に即座に同期
  if(!startVotePolling._visAttached){
    document.addEventListener('visibilitychange',async()=>{
      if(!document.hidden&&voteInFlight===0){

}

function _resizeToBase64(file,maxSide,quality){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h&&w>maxSide){h=Math.round(h*maxSide/w);w=maxSide;}
      else if(h>maxSide){w=Math.round(w*maxSide/h);h=maxSide;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      resolve(cv.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>reject(new Error('画像を読み込めません'));
    const fr=new FileReader();
    fr.onload=()=>{img.src=fr.result;};
    fr.onerror=()=>reject(new Error('ファイルを読み込めません'));
    fr.readAsDataURL(file);
  });
}

// ══ HELPERS ══
// Hotpepper API の open は文字列。例: "月～金 17:00～翌1:00 / 土日 12:00～22:00"
function openStatus(s){
  let openStr='';
  if(typeof s.open==='string')openStr=s.open;
  else if(Array.isArray(s.open)){ // 後方互換
    const day=['日','月','火','水','木','金','土'][new Date().getDay()];
    const matched=s.open.find(o=>o&&o.name&&o.name.includes(day))||s.open[0];
    openStr=matched?(matched.time||''):'';
  }
  if(!openStr||!openStr.trim())return{open:null,hours:''};

  // 全体に時間レンジが存在しなければ「不明」
  const hasAnyRange=/\d{1,2}[:：]\d{2}\s*[～〜]\s*翌?\s*\d{1,2}[:：]\d{2}/.test(openStr);

  // 表示用文字列（括弧書きはそのまま残す方向に変更）
  let display=openStr.replace(/\s+/g,' ').trim();
  if(display.length>26){
    const first=display.match(/\d{1,2}[:：]\d{2}\s*[～〜]\s*翌?\s*\d{1,2}[:：]\d{2}/);
    display=first?first[0]:display.slice(0,24)+'…';
  }

  if(!hasAnyRange)return{open:null,hours:display};

  const now=new Date();
  const today=now.getDay(); // 0=日
  const dayOrder=['日','月','火','水','木','金','土'];
  const nm=now.getHours()*60+now.getMinutes();

  // 解析用は括弧書きを除去（L.O.等のノイズ排除）
  let cleaned=openStr.replace(/\([^)]*\)/g,'').replace(/（[^）]*）/g,'');
  // 「時間レンジ末尾 + 空白/句読点 + 曜日文字」を / で分割（区切り無しで複数曜日記述される書式に対応）
  // 例: "月～金 17:00～翌1:00 土、日 17:00～翌0:00" → "月～金 17:00～翌1:00/土、日 17:00～翌0:00"
  cleaned=cleaned.replace(/(\d{1,2}[:：]\d{2})([\s、,，。.])([月火水木金土日祝])/g,'$1/$3');
  const segments=cleaned.split(/[\/／]/).map(x=>x.trim()).filter(Boolean);
  const timeRe=/(\d{1,2})[:：](\d{2})\s*[～〜]\s*(翌?)\s*(\d{1,2})[:：](\d{2})/g;

  // segment から曜日マスクを取り出す。曜日記述が無ければ null
  function parseDayMask(seg){
    if(!/[月火水木金土日祝]/.test(seg))return null;
    if(/毎日|終日|無休|年中無休/.test(seg))return [true,true,true,true,true,true,true];
    const mask=[false,false,false,false,false,false,false];
    // X～Y の範囲
    const ranges=[...seg.matchAll(/([月火水木金土日])\s*[～〜]\s*([月火水木金土日])/g)];
    for(const r of ranges){
      const sI=dayOrder.indexOf(r[1]),eI=dayOrder.indexOf(r[2]);
      if(sI<0||eI<0)continue;
      if(sI<=eI)for(let i=sI;i<=eI;i++)mask[i]=true;
      else{for(let i=sI;i<7;i++)mask[i]=true;for(let i=0;i<=eI;i++)mask[i]=true;}
    }
    // 範囲表現を消した残りで個別曜日チェック
    const rest=seg.replace(/[月火水木金土日]\s*[～〜]\s*[月火水木金土日]/g,'');
    for(let i=0;i<7;i++)if(rest.includes(dayOrder[i]))mask[i]=true;
    // 祝日は便宜上「日曜と同じ」扱い
    if(/祝/.test(seg))mask[0]=true;
    return mask;
  }

  // 粘着: 曜日記述が無い segment は直前の segment の曜日を継承
  let currentMask=null; // null = 全曜日
  let isOpen=false;
  let foundAnyDaySpec=false;
  const todayDisplayRanges=[];

  for(const seg of segments){
    if(/定休|休業|休み/.test(seg))continue;
    const m=parseDayMask(seg);
    if(m){foundAnyDaySpec=true;currentMask=m;}
    const appliesToday=(currentMask===null)||currentMask[today];
    if(!appliesToday)continue;
    timeRe.lastIndex=0;
    let tm;
    while((tm=timeRe.exec(seg))!==null){
      let a=parseInt(tm[1])*60+parseInt(tm[2]);
      let b=parseInt(tm[4])*60+parseInt(tm[5]);
      const nextDay=tm[3]==='翌'||b<a;
      if(nextDay)b+=1440;
      todayDisplayRanges.push(`${tm[1].padStart(2,'0')}:${tm[2]}〜${nextDay?'翌':''}${tm[4].padStart(2,'0')}:${tm[5]}`);
      if(nm>=a&&nm<b)isOpen=true;
      if(nm+1440>=a&&nm+1440<b)isOpen=true; // 昨日からの深夜
    }
  }

  // 曜日指定があったが今日は該当無し → 本日休み（営業中フィルタで除外される）
  if(todayDisplayRanges.length===0&&foundAnyDaySpec){
    return{open:false,hours:'本日休み'};
  }
  // 今日の時間レンジが見つかったらそれだけ表示
  if(todayDisplayRanges.length){
    let td=todayDisplayRanges.join(' / ');
    if(td.length>28)td=todayDisplayRanges[0]+(todayDisplayRanges.length>1?' …':'');
    return{open:isOpen,hours:td};
  }
  // 曜日指定が無く、時間レンジも無い → 不明（元文字列を省略表示）
  return{open:null,hours:display};
}
function shopPrice(s){
  if(s.budget?.average&&s.budget.average!=='')return s.budget.average;
  if(s.budget&&typeof s.budget==='string')return s.budget;
  const m={B001:'〜500',B002:'〜1,000',B003:'〜1,500',B004:'〜2,000',B005:'〜3,000',B006:'〜4,000',B007:'〜5,000'};
  return s.budget&&m[s.budget.code]?m[s.budget.code]+'円':'—';
}
// CROWD → STATION（最寄り駅）に置き換え
function shopStation(s){
  if(s.station_name)return s.station_name;
  if(s.access&&typeof s.access==='string'){
    // アクセス文字列から「○○駅」を抜き取り
    const m=s.access.match(/([぀-ヿ一-龯]+駅)/);
    if(m)return m[1];
  }
  return '—';
}

// ══ RENDER ══
function renderCards(shops){
  const wrap=document.getElementById('cards'),meta=document.getElementById('rmeta');

  // カスタム店舗をマージ（ジャンルフィルター対応）
  const genreNameMap={G001:'居酒屋',G016:'焼肉',G013:'ラーメン',G004:'焼き鳥',G008:'和食',G009:'中華',G019:'バー',G014:'カフェ',G006:'イタリアン'};
  const genreName=genreNameMap[genre]||'';
  let customs=customShops.filter(s=>!genre||s.genre===genreName);
  // 投票50%禁煙のカスタム店も除外
  customs=customs.filter(s=>!isNopeMaj(s.id));

  let list=[...shops,...customs];
  if(vFilter)list=list.filter(s=>vMaj(s.id)===vFilter);

  if(!list.length){
    meta.innerHTML='';
    let emptyHtml='<div class="empty-w"><img class="ippuku-mark cat-empty" src="cat.png" alt="" onerror="this.style.display=\'none\';this.insertAdjacentHTML(\'afterend\',\'<div style=&quot;font-size:52px&quot;>🔍</div>\')"><p>条件に合うお店が見つかりませんでした<br>フィルターを変えてみてください</p></div>';
    if(canLoadMore)emptyHtml+='<div class="load-more-wrap"><button class="load-more-btn" id="load-more-btn" onclick="loadMoreShops()">もっと見る ↓</button></div>';
    wrap.innerHTML=emptyHtml;
    return;
  }
  meta.innerHTML=`<b>${list.length}</b> 件が見つかりました`;

  wrap.innerHTML='<div class="cards">'+list.map(s=>{
    const isCustom=!!s.custom;
    const st=isCustom?{open:null,hours:s.hours||''}:openStatus(s);
    const station=isCustom?'—':shopStation(s);
    const pr=isCustom?s.budget||'—':shopPrice(s);
    const pillC=st.open===true?'sp-open':st.open===false?'sp-closed':'sp-unk';
    const pillT=st.open===true?'● 営業中':st.open===false?'● 準備中':'? 不明';
    // ホットペッパーの場合は s.photo.pc.l、カスタムは s.photo (base64文字列)
    const img=isCustom?(typeof s.photo==='string'?s.photo:''):(s.photo?.pc?.l||'');
    const myV=myVotes[s.id]||'';
    const v=vGet(s.id),tot=v.heat+v.paper+v.room;
    const pct=n=>tot?Math.round(n/tot*100):0;
    const maj=vMaj(s.id);
    const nm=(s.name||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    const url=isCustom?(s.url||'#'):(s.urls?.pc||'#');
    const rat=parseFloat(s.rating||0);
    const genreLabel=isCustom?s.genre:(s.genre?.name||'');

    const majBadge=maj?`<div class="maj-badge maj-${maj}">${maj==='heat'?'🔥 加熱式が多数派':maj==='paper'?'🚬 紙巻可が多数派':'🚪 喫煙所のみが多数派'}</div>`:'';
    const bars=tot?`<div class="vbars">
      <div class="vbar-row"><div class="vblbl">🔥 加熱式</div><div class="vbtrack"><div class="vbfill fill-heat" style="width:${pct(v.heat)}%"></div></div><div class="vbcnt">${v.heat}</div></div>
      <div class="vbar-row"><div class="vblbl">🚬 紙巻可</div><div class="vbtrack"><div class="vbfill fill-paper" style="width:${pct(v.paper)}%"></div></div><div class="vbcnt">${v.paper}</div></div>
      <div class="vbar-row"><div class="vblbl">🚪 喫煙所</div><div class="vbtrack"><div class="vbfill fill-room" style="width:${pct(v.room)}%"></div></div><div class="vbcnt">${v.room}</div></div>
    </div>${majBadge}`:'';

    // クリックでアプリ内モーダル表示。shop id を渡してデータから自前レンダリング
    const linkOpen=`onclick="openShopModal('${s.id}')"`;
    return `<div class="card${isCustom?' custom':''}">
      <div class="cimg" ${linkOpen}>
        ${img?`<img src="${img}" alt="${nm}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
        <div class="cimg-ph" ${img?'style="display:none"':''}>🍽️</div>
        <div class="cimg-ov"></div>
        <div class="spill ${pillC}">${pillT}</div>
        ${isCustom?'<div class="spill-custom">✚ 手動追加</div>':''}
      </div>
      <div class="cbody">
        <div class="cname-wrap" ${linkOpen}>
          <div class="cname">${s.name}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            ${rat>0?`<div class="crating np-y">★${rat.toFixed(1)}</div>`:''}
            <button class="fav-btn ${favs.has(s.id)?'active':''}" onclick="event.stopPropagation();toggleFav('${s.id}','${nm}',this)" title="お気に入り">${favs.has(s.id)?'★':'☆'}</button>
          </div>
        </div>
        <div class="caddr">📍 ${s.address||'住所不明'}</div>
        <div class="ctags">
          ${genreLabel?`<span class="badge bg-genre">${genreLabel}</span>`:''}
          ${!isCustom&&s.private_room==='あり'?`<span class="badge bg-priv">🚪 個室</span>`:''}
        </div>
        <div class="cstats">
          <div class="sbox"><div class="slbl">HOURS</div><div class="sval ${st.open===true?'s-open':''}" style="font-size:10px">${st.hours||'—'}</div></div>
          <div class="sbox"><div class="slbl">STATION</div><div class="sval" style="font-size:10px">${station}</div></div>
          <div class="sbox"><div class="slbl">BUDGET</div><div class="sval" style="font-size:10px">${pr}</div></div>
        </div>
        <div class="vsec">
          <div class="vtop"><div class="vtop-lbl">🗳 喫煙スタイルを投票</div><div class="vtot">${tot?tot+'票':''}</div></div>
          <div class="vbtns">
            <button class="vbtn vb-heat ${myV==='heat'?'selected':''}" onclick="castVote('${s.id}','${nm}','heat')">🔥 加熱式のみ</button>
            <button class="vbtn vb-paper ${myV==='paper'?'selected':''}" onclick="castVote('${s.id}','${nm}','paper')">🚬 紙巻可</button>
            <button class="vbtn vb-room ${myV==='room'?'selected':''}" onclick="castVote('${s.id}','${nm}','room')">🚪 喫煙所のみ</button>
            <button class="vbtn vb-nope ${myV==='nope'?'selected':''}" onclick="castVote('${s.id}','${nm}','nope')">🚫 禁煙（実は）</button>
          </div>
          ${bars}
        </div>
        <a class="olink" href="#" onclick="event.stopPropagation();event.preventDefault();openShopModal('${s.id}')">詳細を見る →</a>
      </div>
    </div>`;
  }).join('')+'</div>';
  // 「もっと見る」ボタン（さらに取得可能な場合のみ）
  if(canLoadMore){
    wrap.innerHTML+='<div class="load-more-wrap"><button class="load-more-btn" id="load-more-btn" onclick="loadMoreShops()">もっと見る ↓</button></div>';
  }
}

// ══ もっと見る ══
async function loadMoreShops(){
  if(isLoadingMore||!canLoadMore)return;
  isLoadingMore=true;
  const btn=document.getElementById('load-more-btn');
  if(btn){btn.disabled=true;btn.textContent='読み込み中...';}
  try{
    await fetchShops(true);
  }finally{
    isLoadingMore=false;
  }
}

// ══ FAVOURITES ══
let favs = new Set(JSON.parse(localStorage.getItem('kemuri_favs')||'[]'));
let curTab = 'all';

function toggleFav(id, name, btn) {
  if (favs.has(id)) {
    favs.delete(id);
    btn.textContent = '☆';
    btn.classList.remove('active');
  } else {
    favs.add(id);
    btn.textContent = '★';
    btn.classList.add('active');
  }
  localStorage.setItem('kemuri_favs', JSON.stringify([...favs]));
  if (curTab === 'fav') renderFavTab();
}

function switchTab(tab) {
  curTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab==='all');
  document.getElementById('tab-fav').classList.toggle('active', tab==='fav');
  document.getElementById('tab-map').classList.toggle('active', tab==='map');
  // 表示切り替え
  const cardsEl=document.getElementById('cards');
  const metaEl=document.getElementById('rmeta');
  const mapEl=document.getElementById('map-view');
  if (tab === 'map') {
    cardsEl.style.display='none';
    metaEl.style.display='none';
    mapEl.style.display='block';
    _mapShouldAutoFit=true; // タブを開いた時だけ自動ズーム
    renderMap();
  } else {
    cardsEl.style.display='';
    metaEl.style.display='';
    mapEl.style.display='none';
    if (tab === 'all') renderCards(curShops);
    else renderFavTab();
  }
}

// ══ SHOP DETAIL MODAL（自前表示）══
// 店舗オブジェクトを受け取って、ホットペッパーAPIのデータをアプリ風に表示
function _esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function openShopModal(shopId){
  // id から該当ショップを探す（curShops, customShops 両方）
  const s=[...curShops,...customShops].find(x=>x.id===shopId);
  if(!s){console.warn('shop not found',shopId);return;}
  const isCustom=!!s.custom;
  const name=s.name||'店舗詳細';
  const photo=isCustom?(typeof s.photo==='string'?s.photo:''):(s.photo?.pc?.l||'');
  const genre=isCustom?(s.genre||''):(s.genre?.name||'');
  const address=s.address||'';
  const st=isCustom?{hours:s.hours||''}:openStatus(s);
  const hours=st.hours||'—';
  const budget=isCustom?(s.budget||'—'):(s.budget?.average||s.budget?.name||'—');
  const tel=isCustom?'':(s.tel||'');
  const station=isCustom?'':shopStation(s);
  const access=isCustom?'':(s.access||'');
  const capacity=isCustom?'':(s.capacity||'');
  // 定休日: カスタム店は手入力 s.closed、ホットペッパー店は s.close
  const close=isCustom?(s.closed||''):(s.close||'');
  const memo=isCustom?(s.memo||''):'';
  const privateRoom=isCustom?'':(s.private_room||'');
  const nonSmoking=isCustom?'':(s.non_smoking||'');
  const catchTxt=isCustom?'':(s.catch||s.shop_detail_memo||'');
  const url=isCustom?(s.url||''):(s.urls?.pc||'');
  const mapsUrl=address?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`:'';

  const rows=[];
  if(address)rows.push({i:'📍',l:'ADDRESS',v:_esc(address)+(mapsUrl?` <a href="${mapsUrl}" target="_blank" rel="noopener" style="color:var(--accent-andon);text-decoration:underline;">地図</a>`:'')});
  if(hours&&hours!=='—')rows.push({i:'🕐',l:'HOURS',v:_esc(hours)});
  if(close)rows.push({i:'📅',l:'CLOSE',v:_esc(close)});
  if(budget&&budget!=='—')rows.push({i:'💰',l:'BUDGET',v:_esc(budget)});
  if(tel)rows.push({i:'📞',l:'TEL',v:`<a href="tel:${_esc(tel)}" style="color:var(--accent-andon);text-decoration:underline;">${_esc(tel)}</a>`});
  if(station)rows.push({i:'🚉',l:'STATION',v:_esc(station)});
  if(access)rows.push({i:'🚶',l:'ACCESS',v:_esc(access)});
  if(capacity)rows.push({i:'👥',l:'CAPACITY',v:_esc(capacity)});
  if(privateRoom)rows.push({i:'🚪',l:'個室',v:_esc(privateRoom)});
  if(nonSmoking)rows.push({i:'🚬',l:'喫煙',v:_esc(nonSmoking)});
  if(memo)rows.push({i:'📝',l:'MEMO',v:_esc(memo).replace(/\n/g,'<br>')});

  const photoHtml=photo
    ?`<img class="sm-photo" src="${_esc(photo)}" alt="${_esc(name)}" onerror="this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')"><div class="sm-photo-ph" style="display:none">🍽️</div>`
    :`<div class="sm-photo-ph">🍽️</div>`;

  const actionsHtml=[];
  if(url)actionsHtml.push(`<a class="sm-btn sm-btn-primary" href="${_esc(url)}" target="_blank" rel="noopener">${isCustom?'🔗 公式ページ':'🍽️ ホットペッパーで予約'}</a>`);
  if(mapsUrl)actionsHtml.push(`<a class="sm-btn sm-btn-secondary" href="${mapsUrl}" target="_blank" rel="noopener">🗺 地図で見る</a>`);

  document.getElementById('shop-modal-title').textContent=name;
  document.getElementById('shop-modal-body').innerHTML=`
    ${photoHtml}
    <div class="sm-content">
      ${genre?`<span class="sm-genre">${_esc(genre)}</span>`:''}
      ${catchTxt?`<div class="sm-catch">${_esc(catchTxt)}</div>`:''}
      ${rows.map(r=>`<div class="sm-row"><div class="sm-icon">${r.i}</div><div style="flex:1;"><div class="sm-label">${r.l}</div><div class="sm-value">${r.v}</div></div></div>`).join('')}
    </div>
    ${actionsHtml.length?`<div class="sm-actions">${actionsHtml.join('')}</div>`:''}
  `;
  document.getElementById('shop-modal').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeShopModal(){
  document.getElementById('shop-modal').classList.add('hidden');
  document.body.style.overflow='';
}
document.getElementById('shop-modal-close').onclick=closeShopModal;
document.getElementById('shop-modal').addEventListener('click',e=>{
  if(e.target.id==='shop-modal')closeShopModal();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&!document.getElementById('shop-modal').classList.contains('hidden'))closeShopModal();
});

// ══ MAP ══
let _map=null,_markers=[],_mapShouldAutoFit=true; // 初回 or タブ切替直後だけ自動ズーム
function renderMap(){
  if(typeof L==='undefined'){ // Leaflet がまだ読み込まれていない
    setTimeout(renderMap,300); return;
  }
  // 初回のみ地図を作成
  if(!_map){
    _map=L.map('map',{zoomControl:true}).setView([34.8394,134.6939],14); // 姫路駅
    // ダークテーマのタイル (CartoDB)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      attribution:'&copy; OpenStreetMap &copy; CARTO',
      maxZoom:19
    }).addTo(_map);
  }
  // 既存マーカーを全削除
  _markers.forEach(m=>_map.removeLayer(m));
  _markers=[];
  // 現在表示中のショップ一覧（filter 適用済み）を地図に
  // lat/lng が parseFloat 可能なものだけ含める（0 緯度などにも対応）
  const _hasCoord=s=>Number.isFinite(parseFloat(s.lat))&&Number.isFinite(parseFloat(s.lng));
  const shopList=[...curShops,...customShops.filter(_hasCoord)];
  // 投票フィルタも適用
  const filtered=vFilter?shopList.filter(s=>vMaj(s.id)===vFilter):shopList;
  const bounds=[];
  filtered.forEach(s=>{
    const lat=parseFloat(s.lat),lng=parseFloat(s.lng);
    if(!lat||!lng)return;
    const maj=vMaj(s.id)||'none';
    const cls='kemuri-pin pin-'+maj;
    const icon=L.divIcon({className:'',html:'<span class="'+cls+'"></span>',iconSize:[22,22],iconAnchor:[11,11]});
    const m=L.marker([lat,lng],{icon}).addTo(_map);
    // 店名をタップすると詳細モーダルを開く
    const safeName=(s.name||'').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const popupHtml=`<a href="#" onclick="event.preventDefault();openShopModal('${s.id}');return false;" style="color:var(--accent-andon);font-weight:700;text-decoration:underline;cursor:pointer;display:inline-block;padding:2px 4px;">${safeName}</a>`;
    m.bindPopup(popupHtml,{closeButton:false});
    _markers.push(m);
    bounds.push([lat,lng]);
  });
  // 自動ズームは「初回 or タブ切替直後」だけ。ユーザーが動かした後の自動同期では維持
  if(_mapShouldAutoFit&&bounds.length>0){
    _map.fitBounds(bounds,{padding:[40,40],maxZoom:16});
    _mapShouldAutoFit=false;
  }
  // タブ切替直後はサイズ計算が狂うことがあるので強制更新
  setTimeout(()=>_map.invalidateSize(),100);
}

function renderFavTab() {
  const wrap = document.getElementById('cards');
  const meta = document.getElementById('rmeta');
  const allShops = [...curShops, ...customShops];
  const favShops = allShops.filter(s => favs.has(s.id));
  if (!favShops.length) {
    meta.innerHTML = '';
    wrap.innerHTML = `<div class="fav-empty"><div style="font-size:48px">☆</div><p>まだお気に入りがありません<br>カードの ☆ をタップして追加しよう</p></div>`;
    return;
  }
  meta.innerHTML = `<b>${favShops.length}</b> 件のお気に入り`;
  // renderCardsと同じロジックで描画
  renderCards(favShops, true);
}

// ↑ボタン: スクロール量で表示/非表示
window.addEventListener('scroll', () => {
  const btn = document.getElementById('fab-top');
  if (!btn) return;
  btn.style.opacity = window.scrollY > 200 ? '1' : '0';
  btn.style.pointerEvents = window.scrollY > 200 ? 'auto' : 'none';
}, {passive:true});
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('fab-top');
  if (btn) { btn.style.opacity='0'; btn.style.transition='opacity .3s'; }
});

// ══ FETCH ══
async function fetchShops(append=false){
  if(!append){
    document.getElementById('cards').innerHTML='<div class="loading-wrap"><div class="spinner"></div><div class="ltxt">お店を検索中...</div></div>';
    document.getElementById('rmeta').innerHTML='';
    nextStart=1; totalAvailable=0; canLoadMore=false;
  }
  const kw=document.getElementById('kw').value.trim();
  const p=new URLSearchParams({count:100,order:4});
  if(kw)p.set('keyword',kw);
  if(genre)p.set('genre',genre);
  if(fBudget)p.set('budget',fBudget);
  if(fPrivate)p.set('private_room',1);
  p.set('start',String(nextStart));
  try{
    const r=await fetch(IPPUKU_API_BASE+'/api/search?'+p);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data.results?.error)throw new Error(data.results.error[0]?.message||'APIエラー');
    let shops=data.results?.shop||[];
    const rawCount=shops.length; // フィルタ前の件数
    totalAvailable=parseInt(data.results?.results_available)||totalAvailable;
    // 喫煙可否判定: 「喫煙〜」「分煙」のキーワードがあれば表示。
    // 「屋内全面禁煙（喫煙可能室あり）」のようなパターンも吸収するため、
    //  まず喫煙OKキーワードを優先判定 → 該当しなければ全面禁煙系を除外
    shops=shops.filter(s=>{
      const ns=(s.non_smoking||'');
      // ① 喫煙OK系キーワードがあれば必ず表示
      if(/喫煙(可|可能|室|席|スペース|エリア|ブース|所|タバコ)|分煙/.test(ns))return true;
      // ② 明確な全面禁煙系のみ除外
      if(/全席禁煙|完全禁煙|全面禁煙|禁煙席のみ/.test(ns))return false;
      // ③ それ以外（空欄・「なし」など不明）は表示
      return true;
    });
    shops=shops.filter(s=>!isNopeMaj(s.id));
    if(fOpen)shops=shops.filter(s=>openStatus(s).open!==false);
    if(append){
      // 重複除去してから追加
      const known=new Set(curShops.map(s=>s.id));
      curShops=[...curShops,...shops.filter(s=>!known.has(s.id))];
    }else{
      curShops=shops;
    }
    // 次回バッチ開始位置と「もっと見る」可否を更新
    nextStart += 500;
    canLoadMore = rawCount >= 100 && nextStart <= totalAvailable;
    // 地図タブを開いていれば地図を、それ以外はカードを描画
    if(typeof curTab!=='undefined'&&curTab==='map')renderMap();
    else renderCards(curShops);
  }catch(e){
    document.getElementById('rmeta').innerHTML='';
    document.getElementById('cards').innerHTML=`<div class="err-w">❌ ${e.message}<br><br><span style="cursor:pointer;text-decoration:underline;color:var(--neon)" onclick="fetchShops()">再試行 →</span></div>`;
  }
}
</script>
