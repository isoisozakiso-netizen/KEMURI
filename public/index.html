<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KEMURI">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#05050d">
<title>KEMURI — 姫路グルメ 喫煙席検索</title>
<!-- ホーム画面アイコン (PWA) -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kurenaido&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05050d;--bg2:#0c0c18;--bg3:#141422;
  --neon:#ff1a6b;--neon2:#ff7010;--cyan:#00e5ff;
  --purple:#cc44ff;--green:#00ff88;--yellow:#ffe500;--orange:#ff6b35;
  --text:#f0ecff;--text2:#7a7898;--text3:#3e3c58;
  --r:18px;--rs:11px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:0;height:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);opacity:.22;}
.orb1{width:500px;height:500px;background:var(--neon);top:-200px;right:-120px;}
.orb2{width:350px;height:350px;background:var(--cyan);bottom:-120px;left:-80px;}
.orb3{width:220px;height:220px;background:var(--purple);top:50%;left:60%;}

/* ══ NEON ══ */
@keyframes neon-flicker{
  0%,18%,20%,24%,54%,56%,100%{text-shadow:0 0 4px #fff,0 0 10px #fff,0 0 20px var(--neon),0 0 40px var(--neon),0 0 80px var(--neon),0 0 120px var(--neon);opacity:1;}
  19%,55%{text-shadow:none;opacity:.65;}
  23%{text-shadow:0 0 4px #fff,0 0 10px var(--neon),0 0 30px var(--neon);opacity:.9;}
}
@keyframes neon-pulse{0%,100%{text-shadow:0 0 6px #fff,0 0 14px var(--neon),0 0 28px var(--neon);}50%{text-shadow:0 0 3px #fff,0 0 8px var(--neon),0 0 16px var(--neon);}}
@keyframes neon-pulse-y{0%,100%{text-shadow:0 0 6px #fff,0 0 14px var(--yellow),0 0 28px var(--yellow);}50%{text-shadow:0 0 3px #fff,0 0 8px var(--yellow),0 0 16px var(--yellow);}}
.nn{color:#fff;animation:neon-flicker 7s infinite;}
.np-r{color:#fff;animation:neon-pulse 2.5s ease-in-out infinite;}
.np-y{color:#fff;animation:neon-pulse-y 2.8s ease-in-out infinite;}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:300;background:#05050d;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity .7s ease;}
#splash.fade-out{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Bebas Neue',sans-serif;font-size:min(22vw,96px);letter-spacing:12px;color:#fff;text-shadow:0 0 6px #fff,0 0 16px #fff,0 0 40px var(--neon),0 0 80px var(--neon),0 0 140px var(--neon),0 0 200px var(--neon);animation:splash-glow 1.8s ease-out both;}
.splash-sub{font-size:10px;letter-spacing:3px;color:var(--text3);margin-top:12px;animation:splash-sub-in 1.8s .3s ease both;opacity:0;font-family:"Zen Kurenaido",serif;text-align:center;}
@keyframes splash-glow{0%{opacity:0;transform:scale(.92);text-shadow:none;}30%{opacity:1;transform:scale(1.04);}60%{transform:scale(1);}100%{text-shadow:0 0 6px #fff,0 0 16px #fff,0 0 40px var(--neon),0 0 80px var(--neon),0 0 140px var(--neon);}}
@keyframes splash-sub-in{0%{opacity:0;transform:translateY(8px);}100%{opacity:1;transform:translateY(0);}}

/* ══ PASSWORD ══ */
#pw-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:32px 20px;text-align:center;}
.pw-tube{font-family:'Bebas Neue',sans-serif;font-size:82px;letter-spacing:10px;line-height:1;display:block;margin-bottom:4px;}
.pw-sub{font-size:10px;color:#fff;letter-spacing:3px;margin-bottom:44px;font-family:"Zen Kurenaido",serif;opacity:0.75;}
.pw-card{width:100%;max-width:340px;background:rgba(12,12,24,.92);border:1px solid rgba(255,26,107,.2);border-radius:var(--r);padding:28px 22px;box-shadow:0 0 40px rgba(255,26,107,.1);}
.pw-label{font-size:13px;color:var(--text2);margin-bottom:16px;}
.pw-input{width:100%;padding:16px;letter-spacing:10px;font-size:28px;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:#fff;text-align:center;font-family:'Bebas Neue',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:14px;}
.pw-input:focus{border-color:var(--neon);box-shadow:0 0 0 1px var(--neon),0 0 20px rgba(255,26,107,.3);}
.pw-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--neon),var(--neon2));border:none;border-radius:var(--rs);color:#fff;font-size:15px;font-weight:900;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 28px rgba(255,26,107,.5);transition:opacity .2s,transform .1s;}
.pw-btn:active{opacity:.85;transform:scale(.98);}
.pw-err{font-size:12px;color:var(--neon);margin-top:10px;min-height:20px;text-shadow:0 0 10px var(--neon);}
.pw-hint{font-size:11px;color:var(--text3);margin-top:16px;line-height:1.9;}
/* パスワード表示ボタン */


/* ══ APP ══ */
#app{display:none;position:relative;z-index:1;}

.hdr{position:sticky;top:0;z-index:20;background:rgba(5,5,13,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,26,107,.15);padding:12px 16px 10px;padding-top:max(12px,env(safe-area-inset-top,0px));}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
/* ロゴ: 実写ネオン管風 */
.hdr-logo-wrap{position:relative;display:flex;flex-direction:column;gap:0;}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:6px;line-height:1;background:none;}
/* ネオン管チラつきアニメ */
@keyframes tube-flicker{
  0%,17%,19%,22%,55%,58%,100%{stroke:#ff6090;opacity:1;}
  18%,56%{stroke:#993355;opacity:0.5;}
  20%{stroke:#ff6090;opacity:0.9;}
  57%{stroke:#ff6090;opacity:0.7;}
}
@keyframes core-flicker{
  0%,17%,19%,22%,55%,58%,100%{fill:#fff;opacity:0.92;}
  18%,56%{fill:#ffaac0;opacity:0.4;}
  20%{fill:#fff;opacity:0.88;}
}
/* けむりちゃんのふわふわアニメ */
#kemuri-chan{animation:chan-float 3.5s ease-in-out infinite;}
@keyframes chan-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}

/* ══ KEMURI 黒猫キャラ（静止） ══ */
.kemuri-cat{display:block;filter:drop-shadow(0 6px 20px rgba(255,26,107,.35));}
.cat-splash{width:140px;height:auto;margin:24px auto 0;opacity:0;animation:cat-fade-in 1.2s .8s ease both;}
@keyframes cat-fade-in{0%{opacity:0;transform:translateY(20px) scale(.85);}100%{opacity:1;transform:translateY(0) scale(1);}}
.cat-pw{width:110px;height:auto;margin:14px auto 18px;}
.cat-empty{width:120px;height:auto;margin:0 auto 8px;opacity:.9;}
.cat-hdr{width:36px;height:36px;flex-shrink:0;}


  18%{color:#cc8899;text-shadow:0 0 2px #cc8899,0 0 4px var(--neon);}
  20%,21%{color:#ffe0ec;text-shadow:0 0 2px #fff,0 0 8px #fff,0 0 20px var(--neon),0 0 50px var(--neon);}
  55%,56%{color:#cc8899;text-shadow:none;}
}
.logo-sub{font-size:8px!important;color:var(--text3)!important;letter-spacing:2px!important;margin-top:3px!important;font-family:"Zen Kurenaido",serif!important;font-weight:400!important;opacity:0.9!important;text-transform:none!important;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-badge{border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;background:rgba(255,26,107,.1);border:1px solid rgba(255,26,107,.3);white-space:nowrap;}
/* 店舗追加ボタン */
.add-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.35);color:var(--cyan);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.add-btn:active{transform:scale(.9);}

.search-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--rs);padding:10px 14px;gap:8px;transition:border-color .2s;}
.search-wrap:focus-within{border-color:rgba(255,26,107,.5);box-shadow:0 0 12px rgba(255,26,107,.12);}
.search-wrap input{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.search-wrap input::placeholder{color:var(--text3);}

.genre-row{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);}
.gbtn{white-space:nowrap;padding:8px 16px;border-radius:30px;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,.09);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.gbtn.on{border-color:var(--neon);color:#fff;background:rgba(255,26,107,.08);box-shadow:0 0 14px rgba(255,26,107,.35);text-shadow:0 0 8px rgba(255,26,107,.8);}
.gbtn:active{transform:scale(.95);}

.chip-row{display:flex;gap:7px;padding:0 16px 8px;overflow-x:auto;scrollbar-width:none;}
.chip{white-space:nowrap;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,.08);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0;}
.chip.on{background:rgba(0,229,255,.08);border-color:var(--cyan);color:#fff;text-shadow:0 0 8px var(--cyan);}
.chip:active{transform:scale(.95);}

.vf-row{display:flex;gap:7px;padding:4px 16px 12px;overflow-x:auto;scrollbar-width:none;align-items:center;}
.vf-lbl{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.vfchip{white-space:nowrap;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.08);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0;}
.vfchip:active{transform:scale(.95);}
.vf-all-on{border-color:var(--green)!important;color:#fff!important;background:rgba(0,255,136,.08)!important;text-shadow:0 0 8px var(--green);}
.vf-heat-on{border-color:var(--orange)!important;color:#fff!important;background:rgba(255,107,53,.08)!important;text-shadow:0 0 8px var(--orange);}
.vf-paper-on{border-color:var(--neon)!important;color:#fff!important;background:rgba(255,26,107,.08)!important;text-shadow:0 0 8px var(--neon);}
.vf-room-on{border-color:var(--cyan)!important;color:#fff!important;background:rgba(0,229,255,.08)!important;text-shadow:0 0 8px var(--cyan);}

.divider{height:1px;background:linear-gradient(to right,transparent,rgba(255,26,107,.18),transparent);margin:0 16px 6px;}
.rmeta{padding:6px 16px 2px;font-size:12px;color:var(--text3);}
.rmeta b{color:var(--neon);}

/* ══ CARDS ══ */
.cards{padding:8px 16px 100px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(255,255,255,.06);overflow:hidden;animation:fadeUp .32s ease both;}
.card:hover{border-color:rgba(255,26,107,.22);box-shadow:0 8px 32px rgba(255,26,107,.09);}
/* 手動追加カードは枠をシアンに */
.card.custom{border-color:rgba(0,229,255,.2);}
.card.custom:hover{border-color:rgba(0,229,255,.45);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.card:nth-child(1){animation-delay:.03s;}.card:nth-child(2){animation-delay:.07s;}
.card:nth-child(3){animation-delay:.11s;}.card:nth-child(4){animation-delay:.15s;}
.card:nth-child(5){animation-delay:.19s;}.card:nth-child(6){animation-delay:.23s;}
.card:nth-child(7){animation-delay:.27s;}.card:nth-child(8){animation-delay:.31s;}

.cimg{width:100%;height:150px;position:relative;overflow:hidden;background:var(--bg3);cursor:pointer;}
.cimg img{width:100%;height:100%;object-fit:cover;display:block;}
.cimg-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;color:var(--text3);background:linear-gradient(135deg,var(--bg3),var(--bg2));}
.cimg-ov{position:absolute;bottom:0;left:0;right:0;height:70px;background:linear-gradient(to top,rgba(5,5,13,.95),transparent);}
.spill{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;backdrop-filter:blur(10px);}
.sp-open{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3);text-shadow:0 0 8px var(--green);}
.sp-closed{background:rgba(255,26,107,.15);color:#ff8080;border:1px solid rgba(255,26,107,.3);}
.sp-unk{background:rgba(255,255,255,.08);color:var(--text2);border:1px solid rgba(255,255,255,.12);}
/* 手動追加バッジ */
.spill-custom{position:absolute;top:10px;left:10px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(0,229,255,.15);color:var(--cyan);border:1px solid rgba(0,229,255,.3);backdrop-filter:blur(8px);}

.cbody{padding:14px 15px 16px;}
.cname-wrap{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;cursor:pointer;margin-bottom:3px;}
.cname{font-size:17px;font-weight:700;line-height:1.3;color:#fff;text-shadow:0 0 8px rgba(255,26,107,.35);}
.crating{font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.caddr{font-size:11px;color:var(--text3);margin-bottom:9px;}
.ctags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:14px;font-size:11px;font-weight:700;}
.bg-genre{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid rgba(255,255,255,.08);}
.bg-priv{background:rgba(255,124,30,.1);color:var(--neon2);border:1px solid rgba(255,124,30,.22);}

.cstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;}
.sbox{background:var(--bg3);border-radius:10px;padding:8px;text-align:center;}
.slbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.sval{font-size:11px;font-weight:700;color:var(--text);line-height:1.2;}
.s-open{color:var(--green);text-shadow:0 0 8px var(--green);}
.s-low{color:var(--cyan);}.s-mid{color:var(--yellow);}.s-hi{color:var(--neon);}

.vsec{background:var(--bg3);border-radius:var(--rs);padding:12px 13px;border:1px solid rgba(255,255,255,.06);}
.vtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.vtop-lbl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.vtot{font-size:11px;color:var(--text3);}
.vbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.vbtn{padding:9px 4px;border-radius:10px;font-size:12px;font-weight:700;border:1px solid;background:transparent;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3;font-family:'Noto Sans JP',sans-serif;position:relative;overflow:hidden;}
.vbtn:active{transform:scale(.93);}
.vbtn.selected::after{content:'✓';position:absolute;top:3px;right:7px;font-size:10px;}
.vb-heat{color:var(--orange);border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.08);}
.vb-heat.selected{background:rgba(255,107,53,.2);box-shadow:0 0 12px rgba(255,107,53,.4);text-shadow:0 0 8px var(--orange);}
.vb-paper{color:var(--neon);border-color:rgba(255,26,107,.4);background:rgba(255,26,107,.08);}
.vb-paper.selected{background:rgba(255,26,107,.2);box-shadow:0 0 12px rgba(255,26,107,.4);text-shadow:0 0 8px var(--neon);}
.vb-room{color:var(--cyan);border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.08);}
.vb-room.selected{background:rgba(0,229,255,.2);box-shadow:0 0 12px rgba(0,229,255,.3);text-shadow:0 0 8px var(--cyan);}
.vb-nope{color:var(--text3);border-color:rgba(255,255,255,.1);background:rgba(0,0,0,.2);}
.vb-nope.selected{background:rgba(255,255,255,.08);color:var(--text2);}

.vbars{display:flex;flex-direction:column;gap:6px;}
.vbar-row{display:flex;align-items:center;gap:7px;}
.vblbl{font-size:10px;color:var(--text2);width:66px;flex-shrink:0;}
.vbtrack{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.vbfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.25,.46,.45,.94);}
.fill-heat{background:var(--orange);box-shadow:0 0 6px var(--orange);}
.fill-paper{background:var(--neon);box-shadow:0 0 6px var(--neon);}
.fill-room{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}
.vbcnt{font-size:10px;color:var(--text3);width:20px;text-align:right;flex-shrink:0;}
.maj-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-top:8px;}
.maj-heat{background:rgba(255,107,53,.14);color:var(--orange);border:1px solid rgba(255,107,53,.3);}
.maj-paper{background:rgba(255,26,107,.14);color:var(--neon);border:1px solid rgba(255,26,107,.3);}
.maj-room{background:rgba(0,229,255,.14);color:var(--cyan);border:1px solid rgba(0,229,255,.3);}

.olink{display:block;width:100%;margin-top:12px;padding:11px;background:transparent;border:1px solid rgba(255,26,107,.3);border-radius:var(--rs);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none;font-family:'Noto Sans JP',sans-serif;transition:all .15s;letter-spacing:0.5px;text-shadow:0 0 8px rgba(255,26,107,.6);}
.olink:hover{background:rgba(255,26,107,.08);border-color:var(--neon);}

.loading-wrap{display:flex;flex-direction:column;align-items:center;padding:64px 20px;gap:14px;}
.spinner{width:36px;height:36px;border:2px solid rgba(255,26,107,.2);border-top-color:var(--neon);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-size:13px;color:var(--text2);letter-spacing:1px;}
.empty-w{display:flex;flex-direction:column;align-items:center;padding:64px 20px;gap:12px;color:var(--text3);text-align:center;line-height:1.7;}
.err-w{margin:16px;padding:16px;background:rgba(255,26,107,.07);border:1px solid rgba(255,26,107,.2);border-radius:var(--rs);font-size:13px;color:#ff8080;line-height:1.8;}

/* ── 右下固定ボタン群 ── */
.fab-group{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));right:16px;z-index:50;display:flex;flex-direction:column;gap:10px;align-items:center;}
.fab{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s;border:none;font-family:'Noto Sans JP',sans-serif;}
.fab:active{transform:scale(.9);}
.fab-top{background:rgba(255,26,107,.15);border:1px solid rgba(255,26,107,.4);color:var(--neon);box-shadow:0 0 12px rgba(255,26,107,.25);}
.fab-top:hover{background:rgba(255,26,107,.25);}

/* ── タブ（すべて / お気に入り）── */
.tab-row{display:flex;gap:0;padding:0 16px 0;margin-bottom:0;}
.tab-btn{flex:1;padding:10px 0;font-size:13px;font-weight:700;background:transparent;border:none;border-bottom:2px solid rgba(255,255,255,.08);color:var(--text3);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .18s;letter-spacing:0.5px;}
.tab-btn.active{color:var(--neon);border-bottom-color:var(--neon);text-shadow:0 0 8px rgba(255,26,107,.5);}

/* ── ☆ お気に入りボタン ── */
.fav-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;line-height:1;transition:transform .15s;flex-shrink:0;}
.fav-btn:active{transform:scale(.85);}
.fav-btn.active{filter:drop-shadow(0 0 6px #ffcc00);}

/* ── お気に入り空欄 ── */
.fav-empty{display:flex;flex-direction:column;align-items:center;padding:64px 20px;gap:12px;color:var(--text3);text-align:center;line-height:1.7;}

/* ══ MODAL (手動追加) ══ */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;}
.modal-bg.hidden{display:none;}
.modal{width:100%;max-width:480px;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid rgba(0,229,255,.2);padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));max-height:90dvh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:900;color:#fff;text-align:center;margin-bottom:20px;letter-spacing:1px;}
.modal-title span{color:var(--cyan);text-shadow:0 0 10px var(--cyan);}
.mrow{margin-bottom:14px;}
.mlbl{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.minput{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s;}
.minput:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(0,229,255,.15);}
.mselect{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;appearance:none;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
.m-cancel{padding:13px;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:var(--text2);font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.m-submit{padding:13px;background:linear-gradient(135deg,var(--cyan),#0099bb);border:none;border-radius:var(--rs);color:#000;font-size:14px;font-weight:900;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:1px;}
.m-submit:active{opacity:.85;transform:scale(.98);}
.m-err{font-size:12px;color:var(--neon);margin-top:8px;text-align:center;min-height:18px;}
</style>
</head>

function todayPw(){
  const d=new Date(), y=d.getFullYear()%100, m=d.getMonth()+1, dd=d.getDate();

}

function _setCookie(name,val,days){
  const d=new Date();d.setTime(d.getTime()+days*86400000);
  document.cookie=name+'='+val+';expires='+d.toUTCString()+';path=/;SameSite=Lax';
}
function _getCookie(name){
  const m=document.cookie.match(new RegExp('(?:^|; )'+name+'=([^;]+)'));
  return m?decodeURIComponent(m[1]):null;
}

// ══ VOTES API ══
// Cloudflare KV は結果整合性（書き込み伝播に最大60秒）のため、
// 自分が投票した直後はサーバー値で上書きせず、ローカル状態を優先する。
let lastVoteAt=0;
const VOTE_PROPAGATION_MS=60000; // KV 伝播待ち時間

async function loadVotes(){
  try{
    // cache:'no-store' でブラウザキャッシュを回避し、必ず最新を取りに行く
    const r=await fetch(KEMURI_API_BASE+'/api/votes?userId='+encodeURIComponent(userId)+'&t='+Date.now(),{cache:'no-store'});
    if(r.ok){
      const fresh=await r.json();
      // サーバーから「自分の投票」を取り出して myVotes を復元（キャッシュ消去後の復活用）
      const recovered={};
      for(const id in fresh){
        if(fresh[id].myVote){
          recovered[id]=fresh[id].myVote;
          delete fresh[id].myVote; // 集計データには含めない
        }
      }
      if(Object.keys(recovered).length){
        myVotes={...recovered,...myVotes}; // ローカルが優先（最新の投票を上書きしないため）
        localStorage.setItem('kemuri_mv',JSON.stringify(myVotes));
      }
      // 直近60秒以内に投票した店舗は、ローカルの新しい状態を保持してマージ
      if(Date.now()-lastVoteAt<VOTE_PROPAGATION_MS){
        for(const id in votes){
          if(myVotes[id]){ // 自分が投票した店舗だけローカル優先
            fresh[id]=votes[id];
          }
        }
      }
      // KV 結果整合性対策: サーバーが完全に空 {} を返した時だけキャッシュを使う
      // それ以外は常にサーバーを信頼する（端末間の同期を優先）
      const freshIsEmpty=Object.keys(fresh).length===0;
      const cacheHasData=Object.keys(votes).length>0;
      if(!freshIsEmpty||!cacheHasData){
        votes=fresh;
        _saveVotesCache();
      }
      // else: サーバーが空でキャッシュにデータがある → 起動直後の KV stale 対策でキャッシュ保持
    }
  }catch(_){ /* ネットワークエラー時は既存の votes を保持 */ }
}
async function castVote(shopId,shopName,type){
  if(!votes[shopId])votes[shopId]={heat:0,paper:0,room:0,nope:0};
  const prev=myVotes[shopId];
  if(prev&&votes[shopId][prev]>0)votes[shopId][prev]--;
  myVotes[shopId]=type;votes[shopId][type]++;
  localStorage.setItem('kemuri_mv',JSON.stringify(myVotes));
  lastVoteAt=Date.now();
  _saveVotesCache(); // 楽観的更新をキャッシュにも保存
  rerenderCurrentTab();
  voteInFlight++;
  try{
    const r=await fetch(KEMURI_API_BASE+'/api/votes',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({shopId,shopName,type,userId})
    });
    if(r.ok){
      const updated=await r.json();
      // サーバー側で userId ごとの再投票処理を済ませた正値で上書き
      votes[shopId]={
        heat:updated.heat||0,
        paper:updated.paper||0,
        room:updated.room||0,
        nope:updated.nope||0,
        name:updated.name||''
      };
      lastVoteAt=Date.now(); // 再度更新時刻を記録
      _saveVotesCache(); // 投票結果をブラウザに保存
      rerenderCurrentTab();
    }
  }catch(_){}
  finally{voteInFlight=Math.max(0,voteInFlight-1);}
}
function rerenderCurrentTab(){
  if(typeof curTab!=='undefined'&&curTab==='fav')renderFavTab();
  else renderCards(curShops);
}
// 他端末からの投票を反映するため定期同期
function startVotePolling(){
  if(votePollTimer)return;
  votePollTimer=setInterval(async()=>{
    if(voteInFlight>0||document.hidden)return;
    await loadVotes();
    rerenderCurrentTab();
  },15000);
}
function vGet(id){return votes[id]||{heat:0,paper:0,room:0,nope:0};}
function vMaj(id){
  const v=vGet(id),t=v.heat+v.paper+v.room;
  if(!t)return null;
  if(v.heat>=v.paper&&v.heat>=v.room)return 'heat';
  if(v.paper>=v.room)return 'paper';
  return 'room';
}
function isNopeMaj(id){
  // 「禁煙」票が 1 票でも入っていたら非表示にする
  const v=vGet(id);
  return (v.nope||0)>=1;
}

// ══ HELPERS ══
function openStatus(s){
  const now=new Date(),day=['日','月','火','水','木','金','土'][now.getDay()];
  const nm=now.getHours()*60+now.getMinutes();
  const info=Array.isArray(s.open)?s.open:[];
  const matched=info.find(o=>o&&o.name&&o.name.includes(day))||info[0];
  const t=matched?(matched.time||''):'';
  const mx=t.match(/(\d{1,2}):(\d{2})〜(\d{1,2}):(\d{2})/);
  if(mx){let a=parseInt(mx[1])*60+parseInt(mx[2]),b=parseInt(mx[3])*60+parseInt(mx[4]);if(b<a)b+=1440;return{open:nm>=a&&nm<b,hours:t};}
  return{open:null,hours:t};
}
function shopPrice(s){
  if(s.budget?.average&&s.budget.average!=='')return s.budget.average;
  if(s.budget&&typeof s.budget==='string')return s.budget;
  const m={B001:'〜500',B002:'〜1,000',B003:'〜1,500',B004:'〜2,000',B005:'〜3,000',B006:'〜4,000',B007:'〜5,000'};
  return s.budget&&m[s.budget.code]?m[s.budget.code]+'円':'—';
}
function shopCrowd(s){
  const n=(s.id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%4;
  return[{l:'空き気味',c:'s-low'},{l:'ふつう',c:'s-mid'},{l:'やや混み',c:'s-mid'},{l:'激混み',c:'s-hi'}][n];
}

function renderCards(shops){
  const wrap=document.getElementById('cards'),meta=document.getElementById('rmeta');

  // カスタム店舗をマージ（ジャンルフィルター対応）
  const genreNameMap={G001:'居酒屋',G016:'焼肉',G013:'ラーメン',G004:'焼き鳥',G008:'和食',G009:'中華',G019:'バー',G014:'カフェ',G006:'イタリアン'};
  const genreName=genreNameMap[genre]||'';
  let customs=customShops.filter(s=>!genre||s.genre===genreName);
  // 投票50%禁煙のカスタム店も除外
  customs=customs.filter(s=>!isNopeMaj(s.id));

  let list=[...shops,...customs];
  if(vFilter)list=list.filter(s=>vMaj(s.id)===vFilter);

  if(!list.length){
    meta.innerHTML='';
    wrap.innerHTML='<div class="empty-w"><img class="kemuri-cat cat-empty" src="cat.png" alt="" onerror="this.style.display=\'none\';this.insertAdjacentHTML(\'afterend\',\'<div style=&quot;font-size:52px&quot;>🔍</div>\')"><p>条件に合うお店が見つかりませんでした<br>フィルターを変えてみてください</p></div>';
    return;
  }
  meta.innerHTML=`<b>${list.length}</b> 件が見つかりました`;

  wrap.innerHTML='<div class="cards">'+list.map(s=>{
    const isCustom=!!s.custom;
    const st=isCustom?{open:null,hours:s.hours||''}:openStatus(s);
    const cr=shopCrowd(s),pr=isCustom?s.budget||'—':shopPrice(s);
    const pillC=st.open===true?'sp-open':st.open===false?'sp-closed':'sp-unk';
    const pillT=st.open===true?'● 営業中':st.open===false?'● 準備中':'? 不明';
    const img=s.photo?.pc?.l||'';
    const myV=myVotes[s.id]||'';
    const v=vGet(s.id),tot=v.heat+v.paper+v.room;
    const pct=n=>tot?Math.round(n/tot*100):0;
    const maj=vMaj(s.id);
    const nm=(s.name||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    const url=isCustom?(s.url||'#'):(s.urls?.pc||'#');
    const rat=parseFloat(s.rating||0);
    const genreLabel=isCustom?s.genre:(s.genre?.name||'');

    const majBadge=maj?`<div class="maj-badge maj-${maj}">${maj==='heat'?'🔥 加熱式が多数派':maj==='paper'?'🚬 紙巻可が多数派':'🚪 喫煙所のみが多数派'}</div>`:'';
    const bars=tot?`<div class="vbars">
      <div class="vbar-row"><div class="vblbl">🔥 加熱式</div><div class="vbtrack"><div class="vbfill fill-heat" style="width:${pct(v.heat)}%"></div></div><div class="vbcnt">${v.heat}</div></div>
      <div class="vbar-row"><div class="vblbl">🚬 紙巻可</div><div class="vbtrack"><div class="vbfill fill-paper" style="width:${pct(v.paper)}%"></div></div><div class="vbcnt">${v.paper}</div></div>
      <div class="vbar-row"><div class="vblbl">🚪 喫煙所</div><div class="vbtrack"><div class="vbfill fill-room" style="width:${pct(v.room)}%"></div></div><div class="vbcnt">${v.room}</div></div>
    </div>${majBadge}`:'';

    const linkOpen=url&&url!=='#'?`onclick="window.open('${url}','_blank')"`:'';
    return `<div class="card${isCustom?' custom':''}">
      <div class="cimg" ${linkOpen}>
        ${img?`<img src="${img}" alt="${nm}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
        <div class="cimg-ph" ${img?'style="display:none"':''}>🍽️</div>
        <div class="cimg-ov"></div>
        <div class="spill ${pillC}">${pillT}</div>
        ${isCustom?'<div class="spill-custom">✚ 手動追加</div>':''}
      </div>
      <div class="cbody">
        <div class="cname-wrap" ${linkOpen}>
          <div class="cname">${s.name}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            ${rat>0?`<div class="crating np-y">★${rat.toFixed(1)}</div>`:''}
            <button class="fav-btn ${favs.has(s.id)?'active':''}" onclick="event.stopPropagation();toggleFav('${s.id}','${nm}',this)" title="お気に入り">${favs.has(s.id)?'★':'☆'}</button>
          </div>

        <div class="ctags">
          ${genreLabel?`<span class="badge bg-genre">${genreLabel}</span>`:''}

          </div>
          ${bars}
        </div>
        ${url&&url!=='#'?`<a class="olink" href="${url}" target="_blank" onclick="event.stopPropagation()">詳細・予約を見る →</a>`:''}
      </div>
    </div>`;
  }).join('')+'</div>';
}

  if (favs.has(id)) {

  if(kw)p.set('keyword',kw);
  if(genre)p.set('genre',genre);
  if(fBudget)p.set('budget',fBudget);
  if(fPrivate)p.set('private_room',1);
  try{
    const r=await fetch(KEMURI_API_BASE+'/api/search?'+p);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data.results?.error)throw new Error(data.results.error[0]?.message||'APIエラー');
    let shops=data.results?.shop||[];
    // 全席禁煙系の表記揺れ全部にマッチ（部分一致）
    shops=shops.filter(s=>{
      const ns=(s.non_smoking||'');
      return !/全席禁煙|完全禁煙|全面禁煙|店内禁煙|禁煙席のみ|屋内.*禁煙/.test(ns);
    });
    shops=shops.filter(s=>!isNopeMaj(s.id));
    if(fOpen)shops=shops.filter(s=>openStatus(s).open!==false);
    curShops=shops;
    renderCards(shops);
  }catch(e){
    document.getElementById('rmeta').innerHTML='';
    document.getElementById('cards').innerHTML=`<div class="err-w">❌ ${e.message}<br><br><span style="cursor:pointer;text-decoration:underline;color:var(--neon)" onclick="fetchShops()">再試行 →</span></div>`;
  }
}
</script>
</body>
</html>
