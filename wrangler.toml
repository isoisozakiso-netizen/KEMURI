name = "kemuri-himeji"
compatibility_date = "2024-12-01"
pages_build_output_dir = "."

# ── KV 名前空間バインディング ────────────────────────────────
# 1) `npx wrangler kv namespace create KEMURI_KV` を実行すると
#    id が表示されるので、下記 PLACEHOLDER を実 ID に置き換える。
# 2) Cloudflare Pages の Dashboard で
#    Settings → Functions → KV namespace bindings からも設定可能
#    （その場合は wrangler.toml の編集は不要）
[[kv_namespaces]]
binding = "KEMURI_KV"
id      = "PLACEHOLDER_REPLACE_WITH_REAL_KV_ID"

# ── 環境変数 ─────────────────────────────────────────────
# HOTPEPPER_KEY は Dashboard の Environment Variables 側で
# 設定する方が安全です（git にコミットしないため）。
# どうしてもここに書きたい場合は [vars] セクションを追加してください。
